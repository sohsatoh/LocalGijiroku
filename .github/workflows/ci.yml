name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs for the same branch when a new commit lands —
# CI on macOS runners is slow and waiting on a stale run is wasteful.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: swift build + test
    # Apple Silicon runner. macos-15 image has Xcode 16, which is required
    # for the Package's `swift-tools-version:6.0` and `.macOS(.v15)`
    # platform target.
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select latest Xcode
        # macos-15 ships with multiple Xcode versions; pick the most recent
        # 16.x so Swift 6.0 features are available.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM build artifacts
        uses: actions/cache@v4
        with:
          # Caching .build saves ~3-5 minutes of dependency compilation on
          # warm runs. Key on Package resolution so a dependency bump
          # invalidates the cache.
          path: .build
          key: spm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-${{ runner.arch }}-

      - name: swift build
        run: swift build

      - name: swift test
        # Hermetic tests only — Ollama integration tests stay opt-in via
        # RUN_OLLAMA_TESTS=1 and don't run in CI because the GitHub runner
        # has no Ollama daemon.
        run: swift test
